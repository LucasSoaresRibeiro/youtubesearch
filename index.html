<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBMaranata - Pesquisa de Transcrição do YouTube</title>
    <script>

        var LIMIT_RESULTS = 20;
        var MAX_MATCHES_POR_VIDEO = 3;

        async function fetchJson(fileName) {
            const response = await fetch(fileName);
            if (!response.ok) {
                throw new Error(`Falha ao carregar ${fileName}: ${response.status}`);
            }
            return await response.json();
        }

        function cleanText(text) {
            return text.replace(/ {2,}/g, " ");
        }

        function normalizarTexto(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function maxErrosPermitidos(termo) {
            if (termo.length <= 3) return 0;
            if (termo.length <= 6) return 1;
            return Math.min(3, Math.floor(termo.length / 4));
        }

        function distanciaLevenshteinLimitada(a, b, limite) {
            if (Math.abs(a.length - b.length) > limite) return limite + 1;
            if (a === b) return 0;

            const prev = new Array(b.length + 1);
            const curr = new Array(b.length + 1);
            for (let j = 0; j <= b.length; j++) prev[j] = j;

            for (let i = 1; i <= a.length; i++) {
                curr[0] = i;
                let minLinha = curr[0];
                for (let j = 1; j <= b.length; j++) {
                    const custo = a[i - 1] === b[j - 1] ? 0 : 1;
                    curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + custo);
                    minLinha = Math.min(minLinha, curr[j]);
                }
                if (minLinha > limite) return limite + 1;
                for (let j = 0; j <= b.length; j++) prev[j] = curr[j];
            }
            return prev[b.length];
        }

        function tokenizar(texto) {
            const tokens = [];
            let i = 0;
            while (i < texto.length) {
                if (texto.charCodeAt(i) === 32) {
                    i++;
                    continue;
                }
                const start = i;
                while (i < texto.length && texto.charCodeAt(i) !== 32) i++;
                tokens.push({ w: texto.slice(start, i), start: start, end: i });
            }
            return tokens;
        }

        function palavraCombina(token, palavra) {
            if (token.w === palavra) return true;
            const maxErr = maxErrosPermitidos(palavra);
            if (maxErr === 0) return false;
            if (Math.abs(token.w.length - palavra.length) > maxErr) return false;
            return distanciaLevenshteinLimitada(token.w, palavra, maxErr) <= maxErr;
        }

        function buscarExato(texto, termo) {
            const ocorrencias = [];
            let pos = 0;
            while ((pos = texto.indexOf(termo, pos)) !== -1) {
                ocorrencias.push({ start: pos, end: pos + termo.length });
                pos += 1;
            }
            return ocorrencias;
        }

        function buscarPalavraFuzzy(tokens, palavra) {
            const maxErr = maxErrosPermitidos(palavra);
            if (maxErr === 0) return [];
            const ocorrencias = [];
            for (let i = 0; i < tokens.length; i++) {
                const tok = tokens[i];
                if (Math.abs(tok.w.length - palavra.length) > maxErr) continue;
                if (distanciaLevenshteinLimitada(tok.w, palavra, maxErr) <= maxErr) {
                    ocorrencias.push({ start: tok.start, end: tok.end });
                }
            }
            return ocorrencias;
        }

        function buscarFraseFuzzy(tokens, palavras) {
            const maxGap = Math.max(3, palavras.length * 2);
            const ocorrencias = [];

            for (let i = 0; i < tokens.length; i++) {
                if (!palavraCombina(tokens[i], palavras[0])) continue;

                let ti = i + 1;
                let matchStart = tokens[i].start;
                let matchEnd = tokens[i].end;
                let ok = true;

                for (let p = 1; p < palavras.length; p++) {
                    let found = false;
                    const limite = Math.min(tokens.length, ti + maxGap);
                    for (; ti < limite; ti++) {
                        if (palavraCombina(tokens[ti], palavras[p])) {
                            matchEnd = tokens[ti].end;
                            ti++;
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        ok = false;
                        break;
                    }
                }

                if (ok) {
                    ocorrencias.push({ start: matchStart, end: matchEnd });
                    i = ti - 1;
                }
            }
            return ocorrencias;
        }

        function buscarOcorrencias(texto, termo, tokensCache) {
            if (!termo) return [];

            const exato = buscarExato(texto, termo);
            if (exato.length > 0) return exato;

            const palavras = termo.split(' ');
            const tokens = tokensCache || tokenizar(texto);

            if (palavras.length === 1) {
                return buscarPalavraFuzzy(tokens, palavras[0]);
            }
            return buscarFraseFuzzy(tokens, palavras);
        }

        function tStartMsParaPosicao(segmentos, pos) {
            let tStartMs = segmentos[0][1];
            for (let i = 0; i < segmentos.length; i++) {
                if (segmentos[i][0] <= pos) {
                    tStartMs = segmentos[i][1];
                } else {
                    break;
                }
            }
            return tStartMs;
        }

        function extrairTrecho(indice, start, end, margem) {
            margem = margem || 40;
            const texto = indice.t;
            const ctxStart = Math.max(0, start - margem);
            const ctxEnd = Math.min(texto.length, end + margem);
            const prefix = ctxStart > 0 ? '...' : '';
            const suffix = ctxEnd < texto.length ? '...' : '';

            return {
                text: prefix + texto.substring(ctxStart, ctxEnd) + suffix,
                tStartMs: tStartMsParaPosicao(indice.s, start)
            };
        }

        function buscarNoIndice(indice, termo, limite) {
            if (!indice || !indice.t) return [];

            const tokens = tokenizar(indice.t);
            const ocorrencias = buscarOcorrencias(indice.t, termo, tokens);
            const matches = [];
            const max = Math.min(ocorrencias.length, limite || MAX_MATCHES_POR_VIDEO);

            for (let i = 0; i < max; i++) {
                matches.push(extrairTrecho(indice, ocorrencias[i].start, ocorrencias[i].end));
            }
            return matches;
        }

        function montarIndiceLegado(transcricao) {
            const partes = [];
            const segmentos = [];
            let pos = 0;

            for (let si = 0; si < transcricao.length; si++) {
                const seg = transcricao[si];
                const norm = normalizarTexto(cleanText(seg.text));
                if (!norm) continue;

                if (partes.length > 0) {
                    pos += 1;
                }

                segmentos.push([pos, seg.tStartMs]);
                partes.push(norm);
                pos += norm.length;
            }

            const texto = partes.join(' ');
            if (!texto) return null;
            return { t: texto, s: segmentos };
        }

        function buscarNaTranscricao(transcricao, termo) {
            const indice = montarIndiceLegado(transcricao);
            return buscarNoIndice(indice, termo);
        }

        function extrairVideoId(url) {
            try {
                const parsed = new URL(url);
                if (parsed.hostname === 'youtu.be') {
                    return parsed.pathname.slice(1).split('/')[0];
                }
                return parsed.searchParams.get('v');
            } catch {
                const match = url.match(/[?&]v=([^&]+)/);
                return match ? match[1] : null;
            }
        }

        async function carregarManifesto() {
            try {
                return await fetchJson('data/manifest.json');
            } catch {
                return null;
            }
        }

        async function carregarVideosLegado() {
            return await fetchJson('transcricoes.json');
        }

        function renderResultado(item, match) {
            const videoId = item.id || extrairVideoId(item.url);
            const videoTime = Math.floor(match.tStartMs / 1000);
            const videoUrlWithTime = `${item.url}&t=${videoTime}s`;
            const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/0.jpg`;

            return `
                <div style="display:flex; gap:10px">
                    <div style="width: 50%">
                        <iframe style="width: 100%; height=100%" height="100%" src="https://www.youtube.com/embed/${videoId}?start=${videoTime}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div style="width: 45%">
                        <p>${item.titulo}</p>
                        <img style="width: 60%" src="${thumbnailUrl}" alt="Thumbnail">
                        </br>
                        <a href="${videoUrlWithTime}" target="_blank">${match.text}</br>(Assistir trecho no youtube)</a>
                    </div>
                </div>
                <hr>
            `;
        }

        async function carregarIndiceBusca() {
            try {
                return await fetchJson('data/busca.json');
            } catch {
                return null;
            }
        }

        async function searchTranscription() {
            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = 'Carregando indice de busca...';

            const searchText = normalizarTexto(cleanText(document.getElementById('searchText').value));
            if (!searchText) {
                resultsEl.innerHTML = 'Digite um texto para pesquisar.';
                return;
            }

            let html = '';
            let total = 0;

            try {
                const [manifesto, indiceBusca] = await Promise.all([
                    carregarManifesto(),
                    carregarIndiceBusca()
                ]);

                if (manifesto && indiceBusca && indiceBusca.itens) {
                    const itens = (manifesto.itens || []).filter(function (item) {
                        return item.possui_transcricao && indiceBusca.itens[item.id];
                    });

                    for (let i = 0; i < itens.length && total < LIMIT_RESULTS; i++) {
                        const item = itens[i];
                        const matches = buscarNoIndice(
                            indiceBusca.itens[item.id],
                            searchText,
                            LIMIT_RESULTS - total
                        );

                        for (let j = 0; j < matches.length && total < LIMIT_RESULTS; j++) {
                            html += renderResultado(item, matches[j]);
                            total++;
                        }
                    }
                } else if (manifesto) {
                    resultsEl.innerHTML = 'Indice de busca nao encontrado. Execute: python migrar_dados.py';
                    return;
                } else {
                    const data = await carregarVideosLegado();
                    for (let i = 0; i < data.length && total < LIMIT_RESULTS; i++) {
                        const video = data[i];
                        const matches = buscarNaTranscricao(video.transcricao || [], searchText);
                        for (let j = 0; j < matches.length && total < LIMIT_RESULTS; j++) {
                            html += renderResultado(video, matches[j]);
                            total++;
                        }
                    }
                }

                if (total >= LIMIT_RESULTS) {
                    html += `
                        <div style="display:flex; gap:10px">
                            <p>Limite de resultados atingido</p>
                        </div>
                        <hr>
                    `;
                }

                resultsEl.innerHTML = total === 0 ? 'Nenhum resultado encontrado' : html;
            } catch (error) {
                console.error(error);
                resultsEl.innerHTML = 'Erro ao carregar os dados. Verifique se os arquivos JSON estao validos em data/.';
            }
        }

        function getQueryParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function updateUrl(event) {
            window.location.href = location.protocol + '//' + location.host + location.pathname + "?searchText=" + document.getElementById('searchText').value;
            event.stopPropagation();
            event.preventDefault();
        }

        function share() {
            const whats_url = `https://api.whatsapp.com/send/?text=${encodeURI(window.location.href)}&type=phone_number&app_absent=0`;
            window.open(whats_url);
        }

        window.onload = async function() {
            try {
                const manifesto = await carregarManifesto();
                const info = manifesto || await fetchJson('info.json');
                document.getElementById('info').innerHTML = 'Total de videos indexados: ' + info.videos + ' (' + info.dataExecucao + ')';
            } catch {
                document.getElementById('info').innerHTML = 'Nao foi possivel carregar informacoes dos videos.';
            }

            const searchText = getQueryParameter('searchText');
            if (searchText) {
                document.getElementById('searchText').value = searchText;
                searchTranscription();
            }
        }

    </script>
</head>
<body>
    <h1>IBMaranata - Pesquisa de Transcrição do YouTube</h1>
    <div id="info"></div>
    <br>
    <form onsubmit="updateUrl(event)">
        <input type="text" id="searchText" style="width: 50%; height: 20px;" placeholder="Digite o texto para pesquisar">
        <input type="submit" value="Pesquisar">
        <button onclick="share()">Compartilhar</button>
    </form>
    <p>Dica: A busca ignora acentos, cruza trechos da transcricao e tolera pequenas diferencas de grafia.</p>
    <div id="results"></div>
</body>
</html>
